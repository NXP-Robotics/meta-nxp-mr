MACHINE = "imx95-navq"
require conf/machine/imx95-19x19-lpddr5-evk.conf

# Use the open-source Mesa "panfrost" Gallium driver (kernel: panthor) as the
# sole GPU stack instead of ARM's proprietary mali-imx DDK blob. Mesa is built
# from source against the pinned glibc 2.39 (Ubuntu 24.04 ABI), whereas the
# mali-imx r54p1.6 blob requires GLIBC_2.43 and is therefore ABI-incompatible.
# Selecting only "mesa" makes mesa the provider for virtual/egl and
# virtual/libgles*, drops the proprietary blob, and keeps IMX_MALI_DUAL_DRIVER=0.
IMX_MALI_DRIVERS = "mesa"

KERNEL_DEVICETREE:append:use-nxp-bsp = " \
                     freescale/imx95-navqb.dtb \
                     freescale/imx95-navqb-display.dtb \
                     freescale/imx95-navqb-sja1110-bin.dtb \
                     freescale/imx95-navqb-lt8912b.dtb \
                     freescale/imx95-navqb-sfp.dtb \
"

KERNEL_MODULE_AUTOLOAD  += "mlan moal btnxpuart rpmsg_tty"
KERNEL_MODULE_PROBECONF += "moal"
module_conf_moal = "options moal fw_name=nxp/sduart_nw61x_v1.bin.se \
cal_data_cfg=none drv_mode=1 cfg80211_wext=0xf drvdbg=0x00000000" 