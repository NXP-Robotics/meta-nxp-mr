include conf/distro/fsl-imx-xwayland.conf

DISTRO = "imx-desktop-xwayland"

DISTRO_NAME = "Desktop Experience BSP"
DISTRO_VERSION = "1.0"
SDK_VENDOR = "-fslbsp"

TARGET_VENDOR = "-fsl"

SDK_NAME_PREFIX = "${DISTRO}"
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDK_ARCH}-${TUNE_PKGARCH}"

# ptest is enabled by default via DISTRO_FEATURES_DEFAULTS in oe-core (wrynose).
# Opt out using DISTRO_FEATURES_OPTED_OUT (the legacy
# POKY_DEFAULT_DISTRO_FEATURES:remove no longer affects it after the rename).
DISTRO_FEATURES_OPTED_OUT:append = " ptest"
DISTRO_FEATURES_DEFAULTS:append = " benchmark vfat ext2 mtd \
    perl python usbhost virtualization pam polkit"

# Build Mesa as a glvnd EGL/GL vendor so it coexists with Ubuntu's glvnd
# dispatch instead of shipping a conflicting full libEGL. /usr/lib precedence
# then lets Mesa-Panthor win over Ubuntu's bundled mesa vendor.
DISTRO_FEATURES:append = " glvnd"
# With glvnd, libglvnd ships the dispatch (virtual/egl,libgl,libgles*) and Mesa
# is only the vendor; flip providers off the imx default of "mesa".
PREFERRED_PROVIDER_virtual/egl:forcevariable = "libglvnd"
PREFERRED_PROVIDER_virtual/libgl:forcevariable = "libglvnd"
PREFERRED_PROVIDER_virtual/libgl:imxgpu:imxmali = "libglvnd"
PREFERRED_PROVIDER_virtual/libgl:imxgpu3d:imxmali = "libglvnd"
PREFERRED_PROVIDER_virtual/libgles1:forcevariable = "libglvnd"
PREFERRED_PROVIDER_virtual/libgles2:forcevariable = "libglvnd"
PREFERRED_PROVIDER_virtual/libgles3:forcevariable = "libglvnd"

# disable network check to support offline build with sdk iso
CONNECTIVITY_CHECK_URIS = ""

# whiteliste restricted license
LICENSE_FLAGS_ACCEPTED = "non-commercial_netperf commercial_lame"

IMAGE_ROOTFS_SIZE ?= "6291456"

# UBI FS support
MKUBIFS_ARGS = "-m 512 -e 15360 -c 12000"
UBINIZE_ARGS = "-m 512 -p 16KiB -s 512"

# Having some problems with i.MX OpenCV, which is brought in by
# gstreamer1.0-plugins-bad, so disable it
PACKAGECONFIG:remove:pn-gstreamer1.0-plugins-bad = "opencv"

BBMASK += "recipes-fsl/packagegroups/packagegroup-fsl-tools-extended.bbappend"
BBMASK += "recipes-fsl/images/fsl-image-mfgtool.bbappend"

MACHINE_FEATURES:remove = "optee"
