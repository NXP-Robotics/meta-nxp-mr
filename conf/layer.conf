# We have a conf and classes directory, add to BBPATH
# Note how we PREpend BBPATH. This is due to the fact that
# bitbake does not override classes per layer as it does
# recipes. Classes are processed strictly in BBPATH order.
# As we unfortunately have to override standard classes for
# bug fixing, we prepend instead of append our path.

#This layer is a stripped down version of the AMP meta-alb layer
#meant to be used independently outside the AMP solution.
BBPATH =. "${LAYERDIR}:"

BBFILE_COLLECTIONS += "desktop-distro"
BBFILE_PATTERN_desktop-distro := "^${LAYERDIR}"
BBFILE_PRIORITY_desktop-distro = "8"

BBFILES += "${@' '.join('${LAYERDIR}/dynamic-layers/%s/recipes*/*/*.bbappend' % layer \
		for layer in BBFILE_COLLECTIONS.split())}"
BBFILES += "${@' '.join('${LAYERDIR}/dynamic-layers/%s/recipes*/*/*.bb' % layer \
		for layer in BBFILE_COLLECTIONS.split())}"

BBFILES += " \
        ${LAYERDIR}/images/*.bb* \
        ${LAYERDIR}/packagegroups/*.bb* \
        ${LAYERDIR}/recipes-*/*/*.bb \
        ${LAYERDIR}/recipes-*/*/*.bbappend \
        ${LAYERDIR}/classes/*.bb* \
"

BBMASK += "meta-freescale/recipes-graphics/gtk\+/gtk.*\.bbappend"
BBMASK += "meta-freescale/recipes-graphics/gtk\+/gtk\+3_%.bbappend"
BBMASK += "meta-imx/meta-imx-bsp/recipes-gnome/gtk\+3/gtk\+3_%.bbappend"

PYTHON_BASEVERSION:forcevariable = "3.12"

PREFERRED_PROVIDER_qemu = "qemu"
PREFERRED_VERSION_qemu-native = "9.0.2.imx"
PREFERRED_VERSION_qemu = "9.0.2.imx"
PREFERRED_VERSION_nativesdk-qemu = "9.0.2.imx"
PREFERRED_VERSION_glibc = "2.39+git"
PREFERRED_VERSION_libglib-2.0 = "2.78.6"

# Qt 6.4.3 — matches Ubuntu 24.04's libqt6 ABI (6.4.2), avoids conflicts
PREFERRED_VERSION_qtbase           = "6.4.3"
PREFERRED_VERSION_qtdeclarative    = "6.4.3"
PREFERRED_VERSION_qtshadertools    = "6.4.3"
PREFERRED_VERSION_qtsvg            = "6.4.3"
PREFERRED_VERSION_qtlanguageserver = "6.4.3"
PREFERRED_VERSION_qtwayland        = "6.4.3"
PREFERRED_VERSION_qttools          = "6.4.3"
PREFERRED_VERSION_libinput              = "1.25.0"
PREFERRED_VERSION_gobject-introspection = "1.78.1"
PREFERRED_VERSION_python3-pygobject = "3.46.0"
#PREFERRED_VERSION_python3-flit-core = "3.9.0"
#PREFERRED_VERSION_python3-build = "1.2.2"
#PREFERRED_VERSION_python3-wheel = "0.45.1"
#PREFERRED_VERSION_python3-idna = "3.10"
PREFERRED_VERSION_pango = "1.52.1"
PREFERRED_VERSION_python-native = "3.13.9"
PREFERRED_VERSION_python = "3.12.6"
PREFERRED_VERSION_openssl = "3.0.19"
PREFERRED_VERSION_openssl-native = "3.4.1"

LAYERSERIES_COMPAT_desktop-distro = "scarthgap walnascar whinlatter"

MACHINE_FEATURES:remove = "jailhouse"

FSL_BIN_MIRROR ?= "${FSL_MIRROR}"
INIT_MANAGER = "systemd"
