%YAML 1.1
---
version: 1
algorithms:
  - Awb:
  - BlackLevelCorrection:
      # Configured in sensor at 64
      # Listed value is offset for a 12-bit camera pixel format, using libcamera
      # representation for BLC offset that 16-bit signed: 64 * 2^(16 - 12)
      reference-bitdepth: 12
      R: 1024
      Gr: 1024
      Gb: 1024
      B: 1024
  - Agc:
  - Drc:
      # Global DRC control mode. Select among the following options:
      # 0 - copy. Data is copied from input to output of the DRC block, 
      #     no dynamic range compression is done (default)
      # 1 - pre-configured. LUT with 416 entries needs to be specified in this config file
      #     under 'gbl-lut'. If not configured, falls back to mode 0.
      # 2 - dynamic. LUT determined per frame according to input data. 
      gbl-mode: 0
  - Ccm:
      ccms: [
          {
              ct: 2630,
              ccm:
              [
                  2.500, -2.207, 0.707,
                  -0.281, 0.500, 0.781,
                  -0.051, -2.383, 3.434,
              ],
              offsets: [ 0, 0, 0 ]
          },
          {
              ct: 2901,
              ccm:
              [
                  2.203, -1.547, 0.344,
                  -0.277, 0.973, 0.305,
                  0.066, -1.926, 2.859,
              ],
              offsets: [ 0, 0, 0 ]
          },
          {
              ct: 4284,
              ccm:
              [
                  2.090, -0.945, -0.145,
                  -0.258, 1.340, -0.082,
                  0.047, -1.281, 2.234,
              ],
              offsets: [ 0, 0, 0 ]
          },
          {
              ct: 5446,
              ccm:
              [
                  2.117, -1.023, -0.094,
                  -0.188, 1.391, -0.203,
                  0.074, -1.031, 1.957,
              ],
              offsets: [ 0, 0, 0 ]
          },
          {
              ct: 6439,
              ccm:
              [
                  2.121, -0.933, -0.188,
                  -0.141, 1.414, -0.273,
                  0.078, -0.977, 1.898,
              ],
              offsets: [ 0, 0, 0 ]
          },
      ]
...
